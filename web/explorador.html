<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XatarraHosting | Explorador</title>
    
    <style>
        :root {
            --bg-dark: #090b10;
            --card-bg: rgba(17, 25, 40, 0.75);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-cian: #00d2ff;
            --accent-purple: #a371f7;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, rgba(163, 113, 247, 0.15), transparent),
                              radial-gradient(circle at bottom left, rgba(0, 210, 255, 0.1), transparent);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
        }

/* NAVEGACIÓ ESTIL GLASS I STICKY */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 8%;
    
    /* EL MOVIMENT STICKY */
    position: sticky;
    top: 0;
    width: 100%;
    z-index: 1000;
    
    /* ESTIL VISUAL */
    background: rgba(9, 11, 16,); /* Mateix fons que el body però amb opacitat */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-color);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    
    box-sizing: border-box; /* Perquè el padding no ens eixampli el 100% */
}

.logo { 
    font-weight: 800; 
    letter-spacing: -0.5px; 
    font-size: 1.2rem; 
    color: var(--text-main); 
}

/* Això farà que la paraula HOSTING torni a ser blava */
.logo span { 
    color: var(--accent-cian); 
}

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 25px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--text-main); }
	
	/* Ajust per al nav perquè contingui la sessió a la dreta */
	nav {
   	padding: 10px 5%; /* Una mica més estret per encabir-ho tot */
	}

	.nav-right-container {
    	display: flex;
    	align-items: center;
    	gap: 20px;
	}

	/* Versió compacta de la session-card per a la barra superior */
	.session-card-nav {
    	padding: 10px 20px !important;
    	border-radius: 15px !important;
    	margin: 0 !important;
    	text-align: left !important;
    	font-size: 0.8rem;
	}

	.session-card-nav h3 {
    	display: none; /* Amaguem el títol "Sessió Activa" per guanyar espai */
	}

	.session-card-nav .user-name {
    	font-size: 0.9rem !important;
    	margin-bottom: 5px !important;
	}

	.session-card-nav .btn {
   	 padding: 5px 12px !important;
    	font-size: 0.75rem !important;
   	 border-radius: 8px !important;
	}

        /* CARDS ESTIL GLASSMORPHISM */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 30px;
            transition: 0.3s;
        }

        .glass-card:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-5px); }

        /* BOTONS AMB DEGRADAT */
        .btn {
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #6d28d9, #a371f7);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(124, 58, 237, 0.3);
        }

        .btn-outline {
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid var(--border-color);
            margin-left: 10px;
        }

        .btn-outline:hover { background: rgba(255,255,255,0.1); }

        .container {
            max-width: 1100px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .main-header h1 {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-header p {
            color: var(--text-dim);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 20px;
            transition: 0.3s;
        }

        .card:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-5px); }

        .card h3 { color: var(--accent-cian); margin-bottom: 10px; }
        .card p { color: var(--text-dim); margin: 5px 0; }

        .console-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin: 10px 0;
            font-family: monospace;
        }

        footer { text-align: center; color: var(--text-dim); font-size: 0.8rem; padding: 40px; opacity: 0.5; }
    </style>
</head>
<body>
    <nav class="">
        <div class="logo">XATARRA<span>HOSTING</span></div>
    
        <div class="nav-right-container">
            <div class="nav-links" style="position: relative; height: 21px;">
                <a href="index.html"><b>Inici</b></a>
                <a href="serveis.html"><b>Serveis</b></a>
                <a href="explorador.html" style="color: #00d2ff; font-weight: bold;"><b>Explorador</b></a>
                <a href="statistic.html"><b>Estadístiques</b></a>
                <a href="dashboard.html"><b>Dashboard</b></a>
            </div>

            <div id="session-panel" class="glass-card session-card session-card-nav" style="display: none;">
                <h3>Sessi  Activa</h3>
                <span class="user-name" style="font-weight: bold;">Hola, <span id="display-user" style="color: #a371f7; font-weight: bold;">Usuari</span></span>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <header class="main-header">
            <h1>EXPLORADOR<span>_DE_SERVIDORS</span></h1>
            <p>// Llistat de projectes públics de la comunitat</p>
        </header>

        <section class="grid-cards" id="lista-publica">
            <div class="card animate-flicker">
                <p>Cercant servidors ...</p>
            </div>
        </section>

        <br>
        <a href="index.html" class="btn btn-outline"><- TORNAR</a>
    </div>

    <footer class="">
        XatarraHosting v26.7
    </footer>

    <script src="auth.js?v=3"></script>
    <script>
        async function carregarServidors() {
            try {
                const response = await fetch('http://192.168.1.151:3000/api/public-servers');
                const servidors = await response.json();
                
                const llista = document.getElementById('lista-publica');
                llista.innerHTML = ''; // Netegem el missatge de càrrega

                if (servidors.length === 0) {
                    llista.innerHTML = '<p>No hi ha servidors públics actualment.</p>';
                    return;
                }

                servidors.forEach(s => {
                    const icona = s.type === 'minecraft' ? '⛏️' : '🌐';
                    const card = `
                        <div class="card">
                            <h3>${icona} ${s.server_name}</h3>
                            <p>Tipus: ${s.type.toUpperCase()}</p>
                            <p>VMID: ${s.vmid}</p>
                            <div class="console-box" style="padding:10px; font-size:0.8rem;">
                                IP: 192.168.1.150:${s.vmid}
                            </div>
                            <button class="btn" onclick="alert('Connectant...')">UNIR-SE</button>
                        </div>
                    `;
                    llista.innerHTML += card;
                });
            } catch (error) {
                console.error("Error carregant l'explorador:", error);
            }
        }

        carregarServidors();
    </script>
</body>
</html>
