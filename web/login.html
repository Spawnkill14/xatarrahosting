<!doctype html>
<html lang="ca">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>XatarraCloud — Panell</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header class="site-header">
            <div class="container nav">
                <div class="brand">
                    <div class="logo">🚀 XatarraCloud</div>
                </div>
                <div id="nav-auth">
                    <a id="login-btn" class="btn primary" href="https://api.xatarrahosting.cat/auth/github/callback">Login amb GitHub</a>
                </div>
            </div>
        </header>

        <main class="container" style="padding:40px 0">
            <div class="auth-card">
                <div id="app-content" style="display:none">
                    <div id="user-info" style="margin-bottom:18px">
                        Benvingut, <span id="username" style="font-weight:700"></span>!
                    </div>

                    <h3>Crear Nou Servidor Minecraft</h3>
                    <div class="form-row">
                        <label>Nom del servidor</label>
                        <input id="serverName" placeholder="El meu Survival">
                    </div>
                    <div class="form-row">
                        <label>Memòria RAM (GB)</label>
                        <select id="serverRam"><option value="2">2 GB</option><option value="4">4 GB</option><option value="8">8 GB</option></select>
                    </div>
                    <div class="form-row">
                        <label>Versió</label>
                        <select id="serverVersion"><option value="1.20.1">1.20.1 (Recomanat)</option><option value="1.19.4">1.19.4</option><option value="1.18.2">1.18.2</option></select>
                    </div>
                    <div style="margin-top:14px">
                        <button id="deployBtn" class="btn primary" onclick="deployServer()">Crear servidor</button>
                    </div>

                    <hr style="margin:26px 0;border:none;border-top:1px solid rgba(255,255,255,0.04)">
                    <h3>Els meus servidors</h3>
                    <div id="server-list" class="small muted">Carregant servidors...</div>
                </div>

                <div id="login-msg">
                    <h2>Hola! 👋</h2>
                    <p class="muted">Has de fer login amb GitHub per començar a crear els teus servidors al núvol de la Xatarra.</p>
                </div>
            </div>
        </main>

	<script src="auth.js?v=3"></script>
    </body>
</html>
